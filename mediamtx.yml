# ##############################################
# MediaMTX configuration for mediamtx-connect
# ##############################################

# API settings
api: yes
apiAddress: :9997

# Allow API access from any IP (needed for Docker bridge network)
authInternalUsers:
  - user: any
    ips: []
    permissions:
      - action: api
      - action: metrics
      - action: pprof
      - action: playback
      - action: read
      - action: publish

# HLS settings
hls: yes
hlsAddress: :8888

# WebRTC settings (WHEP playback)
webrtc: yes
webrtcAddress: :8889
# In Docker, MediaMTX gathers ICE candidates from its own container interfaces,
# which are addresses the browser can't route to — WHEP negotiates and then never
# connects. This advertises the published host port instead. Same caveat as
# REMOTE_MEDIAMTX_URL: `localhost` is right only when the browser and the stack
# share a host. Reaching this from another machine? Put that host's address here.
webrtcAdditionalHosts: [127.0.0.1]

# Path defaults (recording settings)
pathDefaults:
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S

# Allow any stream path
paths:
  all_others:
