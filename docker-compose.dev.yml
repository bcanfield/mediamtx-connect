# Development only — the MediaMTX side of `pnpm dev` (the app runs on the host
# with hot reload). `pnpm dev` brings this up; `pnpm dev:stop` tears it down.
# Standalone: docker compose -f docker-compose.dev.yml up -d
services:
  mediamtx:
    # -ffmpeg variant (not the stock scratch image): the named dev streams in
    # mediamtx.dev.yml are generated by MediaMTX itself via runOnInit/runOnDemand
    # ffmpeg, which the stock image can't run.
    image: bluenviron/mediamtx:1.19.2-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    networks:
      - dev
    volumes:
      # Dev-only config with a diverse named-stream fleet; keep its base settings
      # in sync with the shipped mediamtx.yml.
      - ./mediamtx.dev.yml:/mediamtx.yml:ro
      # Same physical dir the host api reads (env.ts dev default: <repo>/.dev-data
      # /recordings). Compose resolves relative paths against the repo root, and
      # env.ts anchors its dev dirs to the repo root too, so both agree — this is
      # what fixes the old "MediaMTX records where nothing reads" mismatch.
      - ./.dev-data/recordings:/recordings
    ports:
      - '8554:8554' # RTSP
      - '1935:1935' # RTMP
      - '8888:8888' # HLS
      - '8889:8889' # WebRTC HTTP (WHEP signalling)
      # WebRTC media itself. MediaMTX's ICE UDP port is 8189, not 8890 — 8890 is
      # SRT. Without this published, WHEP negotiates fine and then never connects,
      # and the player silently falls back to HLS.
      - '8189:8189/udp' # WebRTC ICE
      - '8890:8890/udp' # SRT
      - '9997:9997' # API

  # Publishes stream1..5 as wildcard-backed RTSP streams (confName all_others)
  # with a mix of codecs/resolutions/audio. These ride the wildcard on purpose —
  # the named/on-demand cameras live in mediamtx.dev.yml instead. Retries until
  # MediaMTX accepts the push (no container healthcheck to gate on).
  fake-streams:
    build: ./examples/fake-streams
    container_name: fake-streams
    networks:
      - dev
    depends_on:
      - mediamtx
    restart: unless-stopped

networks:
  dev:
