<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas-elevated); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .item { display: flex; align-items: baseline; gap: 20px; }
  .meta { font: 400 11px/1.4 var(--font-mono); color: var(--color-faint); white-space: nowrap; }
</style>
</head>
<body>
<div class="stack">
  <div class="item"><span style="font:600 48px/1 var(--font-sans);letter-spacing:-2.4px;color:#171717">Display XL</span><span class="meta">48 / 600 / -2.4</span></div>
  <div class="item"><span style="font:600 32px/1 var(--font-sans);letter-spacing:-1.28px;color:#171717">Heading LG</span><span class="meta">32 / 600 / -1.28</span></div>
  <div class="item"><span style="font:600 20px/1 var(--font-sans);letter-spacing:-0.4px;color:#171717">Heading MD</span><span class="meta">20 / 600 / -0.4</span></div>
  <div class="item"><span style="font:500 14px/1 var(--font-sans);letter-spacing:-0.28px;color:#171717">Label SM — strong nav emphasis</span><span class="meta">14 / 500 / -0.28</span></div>
</div>
</body>
</html>
