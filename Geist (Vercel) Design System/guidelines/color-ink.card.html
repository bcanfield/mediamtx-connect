<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Canvas" subtitle="The black-on-near-white duet that defines the system" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas); padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; height: 96px; border-radius: 10px; border: 1px solid var(--color-hairline); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .name { font: 500 12px/1.3 var(--font-sans); }
  .hex { font: 400 11px/1.4 var(--font-mono); opacity: .7; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#171717"><span class="name" style="color:#fff">Ink / Primary</span><span class="hex" style="color:#fff">#171717</span></div>
  <div class="sw" style="background:#ffffff"><span class="name">Elevated</span><span class="hex">#ffffff</span></div>
  <div class="sw" style="background:#fafafa"><span class="name">Canvas</span><span class="hex">#fafafa</span></div>
  <div class="sw" style="background:#f2f2f2"><span class="name">Hairline-soft</span><span class="hex">#f2f2f2</span></div>
  <div class="sw" style="background:#ebebeb"><span class="name">Hairline</span><span class="hex">#ebebeb</span></div>
</div>
</body>
</html>
