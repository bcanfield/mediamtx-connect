<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base — xxs 4 → section 128" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #171717; border-radius: 3px; width: 100%; }
  .lab { font: 500 11px/1 var(--font-mono); color: var(--color-body); }
  .px { font: 400 10px/1 var(--font-mono); color: var(--color-faint); }
</style>
</head>
<body>
<div class="row">
  <div class="col" style="width:34px"><div class="bar" style="height:4px"></div><span class="lab">xxs</span><span class="px">4</span></div>
  <div class="col" style="width:34px"><div class="bar" style="height:8px"></div><span class="lab">xs</span><span class="px">8</span></div>
  <div class="col" style="width:34px"><div class="bar" style="height:12px"></div><span class="lab">sm</span><span class="px">12</span></div>
  <div class="col" style="width:34px"><div class="bar" style="height:16px"></div><span class="lab">md</span><span class="px">16</span></div>
  <div class="col" style="width:40px"><div class="bar" style="height:24px"></div><span class="lab">lg</span><span class="px">24</span></div>
  <div class="col" style="width:40px"><div class="bar" style="height:32px"></div><span class="lab">xl</span><span class="px">32</span></div>
  <div class="col" style="width:46px"><div class="bar" style="height:40px"></div><span class="lab">2xl</span><span class="px">40</span></div>
  <div class="col" style="width:52px"><div class="bar" style="height:64px"></div><span class="lab">3xl</span><span class="px">64</span></div>
  <div class="col" style="width:58px"><div class="bar" style="height:96px"></div><span class="lab">4xl</span><span class="px">96</span></div>
</div>
</body>
</html>
