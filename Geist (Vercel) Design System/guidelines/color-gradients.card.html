<!-- @dsCard group="Colors" viewport="700x150" name="Brand Gradients" subtitle="Develop · Preview · Ship — the legacy Vercel trio, and the hero mesh" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas); padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .g { flex: 1; height: 100px; border-radius: 10px; display: flex; align-items: flex-end; padding: 10px; box-sizing: border-box; }
  .name { font: 600 13px/1 var(--font-sans); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.25); }
</style>
</head>
<body>
<div class="row">
  <div class="g" style="background:linear-gradient(90deg,#007cf0,#00dfd8)"><span class="name">Develop</span></div>
  <div class="g" style="background:linear-gradient(90deg,#7928ca,#ff0080)"><span class="name">Preview</span></div>
  <div class="g" style="background:linear-gradient(90deg,#ff4d4d,#f9cb28)"><span class="name">Ship</span></div>
  <div class="g" style="background:var(--gradient-mesh),#fafafa;filter:saturate(1.1)"><span class="name" style="color:#171717;text-shadow:none">Hero mesh</span></div>
</div>
</body>
</html>
