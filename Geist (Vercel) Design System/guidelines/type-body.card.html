<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas-elevated); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; align-items: baseline; gap: 20px; }
  .meta { font: 400 11px/1.4 var(--font-mono); color: var(--color-faint); white-space: nowrap; }
</style>
</head>
<body>
<div class="stack">
  <div class="item"><span style="font:500 12px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.04em;color:#8f8f8f">Mono Eyebrow — Section Label</span><span class="meta">12 / 500 mono</span></div>
  <div class="item"><span style="font:400 16px/1.4 var(--font-sans);color:#4d4d4d">Body LG — lead paragraph copy</span><span class="meta">16 / 400</span></div>
  <div class="item"><span style="font:400 14px/1.4 var(--font-sans);color:#4d4d4d">Body MD — default body, nav links, table cells</span><span class="meta">14 / 400</span></div>
  <div class="item"><span style="font:400 12px/1.4 var(--font-sans);color:#8f8f8f">Body SM — captions, footnotes, metadata</span><span class="meta">12 / 400</span></div>
  <div class="item"><span style="font:400 14px/1.4 var(--font-mono);color:#171717">const code = "Geist Mono";</span><span class="meta">14 / 400 mono</span></div>
</div>
</body>
</html>
