<!-- @dsCard group="Colors" viewport="700x150" name="Text Ladder" subtitle="Ink → body → mute → faint — step emphasis deliberately" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas-elevated); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .txt { font: 600 22px/1 var(--font-sans); letter-spacing: -0.03em; }
  .meta { font: 400 12px/1 var(--font-mono); color: var(--color-faint); }
</style>
</head>
<body>
<div class="stack">
  <div class="line"><span class="txt" style="color:#171717">Ink — headings & high emphasis</span><span class="meta">#171717</span></div>
  <div class="line"><span class="txt" style="color:#4d4d4d">Body — paragraphs & nav</span><span class="meta">#4d4d4d</span></div>
  <div class="line"><span class="txt" style="color:#8f8f8f">Mute — captions & labels</span><span class="meta">#8f8f8f</span></div>
  <div class="line"><span class="txt" style="color:#a1a1a1">Faint — placeholders & disabled</span><span class="meta">#a1a1a1</span></div>
</div>
</body>
</html>
