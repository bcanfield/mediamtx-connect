<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & Elevation" subtitle="Bimodal radius; hairline-first depth" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .box { width: 92px; height: 64px; background: #fff; border: 1px solid var(--color-hairline); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .lab { font: 500 11px/1.3 var(--font-mono); color: var(--color-body); }
</style>
</head>
<body>
<div class="row">
  <div class="box" style="border-radius:6px"><span class="lab">sm 6px</span></div>
  <div class="box" style="border-radius:12px"><span class="lab">md 12px</span></div>
  <div class="box" style="border-radius:16px"><span class="lab">lg 16px</span></div>
  <div class="box" style="border-radius:100px;width:120px"><span class="lab">pill 100px</span></div>
  <div class="box" style="border-radius:12px;box-shadow:var(--shadow-1);border-color:#f0f0f0"><span class="lab">whisper</span></div>
  <div class="box" style="border-radius:12px;box-shadow:var(--shadow-2);border-color:#f0f0f0"><span class="lab">floating</span></div>
</div>
</body>
</html>
