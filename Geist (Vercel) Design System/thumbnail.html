<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; }
  .tile { display: flex; width: 1280px; height: 854px; }
  .main { flex: 1; background: #171717; display: flex; align-items: center; justify-content: center; }
  .mark { font: 600 200px/1 var(--font-sans); letter-spacing: -12px; color: #fff; }
  .strip { display: flex; flex-direction: column; width: 25%; }
  .strip > div { flex: 1; }
</style>
</head>
<body>
<div class="tile">
  <div class="main"><span class="mark">Geist</span></div>
  <div class="strip">
    <div style="background:#50e3c2"></div>
    <div style="background:#0070f3"></div>
    <div style="background:#7928ca"></div>
    <div style="background:#ff0080"></div>
  </div>
</div>
</body>
</html>
