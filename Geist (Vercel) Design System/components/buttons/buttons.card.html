<!-- @dsCard group="Components" viewport="700x300" name="Buttons" subtitle="Marketing pills + 6px app squares, all variants" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-canvas); padding: 28px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .cap { font: 500 12px/1 var(--font-mono); text-transform: uppercase; letter-spacing: .04em; color: var(--color-mute); width: 100%; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.GeistVercelDesignSystem_670231;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="cap">Marketing — pill (lg)</span>
          <Button variant="primary" size="lg">Start Deploying</Button>
          <Button variant="secondary" size="lg">Get a Demo</Button>
        </div>
        <div className="row"><span className="cap">Nav / app — square (md)</span>
          <Button variant="primary" size="md">Sign Up</Button>
          <Button variant="ghost" size="md">Log In</Button>
          <Button variant="danger" size="md">Delete</Button>
          <Button variant="primary" size="md" disabled>Disabled</Button>
        </div>
        <div className="row"><span className="cap">Category tabs + icon</span>
          <Button variant="ghost" size="md" shape="category">AI Apps</Button>
          <Button variant="ghost" size="md" shape="category">Web Apps</Button>
          <Button variant="ghost" size="md" shape="category">Ecommerce</Button>
          <IconButton aria-label="next">→</IconButton>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
