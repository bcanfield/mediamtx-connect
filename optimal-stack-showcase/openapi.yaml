components:
  schemas:
    CreateStreamInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateStreamInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          description: Unique stream path name
          examples:
            - porch-cam
          maxLength: 64
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9-]*$
          type: string
        source:
          description: Source URL to ingest from
          examples:
            - rtsp://camera.local:554/stream3
          format: uri
          type: string
      required:
        - name
        - source
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          description: Service status
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    ListStreamsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListStreamsOutputBody.json
          format: uri
          readOnly: true
          type: string
        streams:
          description: All known streams
          items:
            $ref: "#/components/schemas/Stream"
          type: array
      required:
        - streams
      type: object
    Stream:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Stream.json
          format: uri
          readOnly: true
          type: string
        name:
          description: Unique stream path name
          examples:
            - garage-cam
          type: string
        readers:
          description: Number of connected readers
          format: int64
          type: integer
        ready:
          description: Whether the source is currently publishing
          type: boolean
        source:
          description: Source URL the stream ingests from
          examples:
            - rtsp://camera.local:554/stream1
          format: uri
          type: string
      required:
        - name
        - source
        - ready
        - readers
      type: object
info:
  title: Streams API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/health:
    get:
      operationId: health-check
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Health check
      tags:
        - System
  /api/streams:
    get:
      operationId: list-streams
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List streams
      tags:
        - Streams
    post:
      operationId: create-stream
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStreamInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stream"
          description: Created
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Create a stream
      tags:
        - Streams
  /api/streams/{name}:
    get:
      operationId: get-stream
      parameters:
        - description: Stream path name
          in: path
          name: name
          required: true
          schema:
            description: Stream path name
            examples:
              - garage-cam
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stream"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get a stream by name
      tags:
        - Streams

