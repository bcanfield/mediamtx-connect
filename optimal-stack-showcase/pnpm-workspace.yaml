  # compiler: it errors on anything 7.0 drops, and typescript-eslint supports
  # it (peer <6.1.0) while 7.x is not yet supported. Bump to ^7 when
  # typescript-eslint does. Code is verified to also typecheck under 7.0.2.
  typescript: ^6.0.3
  use-intl: ^4.11.1
  vite: ^8.1.4
  zod: ^4.4.3

onlyBuiltDependencies:
