# Production deployment - runs both MediaMTX and mediamtx-connect
# Usage: docker compose up -d
services:
  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ${MEDIAMTX_RECORDINGS_DIR:-./recordings}:/recordings
    networks:
      - mtx
    ports:
      - '8554:8554' # RTSP
      - '1935:1935' # RTMP
      - '8888:8888' # HLS
      - '8889:8889' # WebRTC HTTP (WHEP signalling)
      # WebRTC media itself. MediaMTX's ICE UDP port is 8189, not 8890 — 8890 is
      # SRT. Without this published, WHEP negotiates fine and then never connects,
      # and the player silently falls back to HLS.
      - '8189:8189/udp' # WebRTC ICE
      - '8890:8890/udp' # SRT
      - '9997:9997' # API

  mediamtx-connect:
    build: .
    depends_on:
      - mediamtx
    container_name: mediamtx-connect
    restart: unless-stopped
    networks:
      - mtx
    environment:
      BACKEND_SERVER_MEDIAMTX_URL: http://mediamtx
      MEDIAMTX_API_PORT: '9997'
      MEDIAMTX_RECORDINGS_DIR: /recordings
      MEDIAMTX_SCREENSHOTS_DIR: /screenshots
    volumes:
      - ${MEDIAMTX_RECORDINGS_DIR:-./recordings}:/recordings
      - mediamtx-connect-data:/data
      - mediamtx-connect-screenshots:/screenshots
    ports:
      - '3000:3000'

networks:
  mtx:
    name: mtx

volumes:
  mediamtx-connect-data:
  # Thumbnails are regenerable, but without a volume they land on the container's
  # writable layer and vanish on every recreate.
  mediamtx-connect-screenshots:
