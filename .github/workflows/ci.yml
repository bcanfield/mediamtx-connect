name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: i18n key parity + README translation sync
        run: pnpm i18n:check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      # Hermetic e2e data dir seeded from committed fixtures. Pinned so the
      # seeder and the webserver agree; kept separate from the dev dir
      # (.dev-data) that env.ts defaults to.
      DATA_DIR: ./test-results/e2e-data/data
      MEDIAMTX_RECORDINGS_DIR: ./test-results/e2e-data/recordings
      MEDIAMTX_SCREENSHOTS_DIR: ./test-results/e2e-data/screenshots
      BACKEND_SERVER_MEDIAMTX_URL: http://127.0.0.1
      REMOTE_MEDIAMTX_URL: http://localhost

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install ffmpeg
        # Committed PNG fixtures cover recording thumbnails; ffmpeg here only
        # feeds the live-snapshot cron. Without it the server logs spawn errors.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Seed test fixtures
        run: node scripts/seed-fixtures.mjs --target ./test-results/e2e-data
      - name: Start MediaMTX with fake streams
        run: |
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for MediaMTX API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9997/v3/paths/list > /dev/null; then
              echo "MediaMTX API is ready"; break
            fi
            [ "$i" = "30" ] && { echo "MediaMTX did not become ready"; docker logs mediamtx 2>&1 | tail -20; exit 1; }
            sleep 2
          done
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Build application
        run: pnpm build
      - name: Run E2E tests
        run: pnpm test:e2e
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== MediaMTX logs ==="
          docker logs mediamtx 2>&1 | tail -50
          echo "=== Fake streams logs ==="
          docker logs fake-streams 2>&1 | tail -50
      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  image-smoke:
    name: Docker image smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mediamtx-connect:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container
        run: |
          docker run -d --name mediamtx-connect-smoke -p 3000:3000 \
            -e BACKEND_SERVER_MEDIAMTX_URL=http://localhost \
            -e REMOTE_MEDIAMTX_URL=http://localhost \
            -e MEDIAMTX_API_PORT=9997 \
            -e MEDIAMTX_RECORDINGS_DIR=/recordings \
            -e MEDIAMTX_SCREENSHOTS_DIR=/screenshots \
            mediamtx-connect:smoke
      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /tmp/health.json 2>/dev/null; then
              echo "Health endpoint returned 200"
              cat /tmp/health.json
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Health endpoint never returned 200"
              exit 1
            fi
            sleep 2
          done
      - name: Assert health response shape
        run: |
          grep -q '"status":"healthy"' /tmp/health.json
      - name: Container logs on failure
        if: failure()
        run: docker logs mediamtx-connect-smoke 2>&1 | tail -200
      - name: Cleanup
        if: always()
        run: docker rm -f mediamtx-connect-smoke || true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test, image-smoke]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm release
