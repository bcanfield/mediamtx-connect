name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

env:
  DATABASE_URL: 'file:./src/lib/prisma/database.db'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests
        run: npm run test:cov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
      - name: Build
        run: npm run build

  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install ffmpeg
        # The instrumentation cron spawns ffmpeg to generate screenshots
        # for orphan recordings. Without this, the server logs spawn errors
        # on boot and the cron is a no-op.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Setup database and test data
        # Run before docker compose so Docker doesn't auto-create
        # ./test-data/recordings as root and break later mkdir calls.
        run: |
          npm run migrate
          npm run db:seed
          npm run setup:test-data
      - name: Start MediaMTX with fake streams
        run: ./scripts/start-mediamtx.sh
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Build application
        run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== MediaMTX logs ==="
          docker logs mediamtx 2>&1 | tail -50
          echo "=== Fake streams logs ==="
          docker logs fake-streams 2>&1 | tail -50
      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml --profile streams down

  image-smoke:
    name: Docker image smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mediamtx-connect:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container
        run: |
          docker run -d --name mediamtx-connect-smoke -p 3000:3000 \
            -e BACKEND_SERVER_MEDIAMTX_URL=http://localhost \
            -e REMOTE_MEDIAMTX_URL=http://localhost \
            -e MEDIAMTX_API_PORT=9997 \
            -e MEDIAMTX_RECORDINGS_DIR=/recordings \
            -e MEDIAMTX_SCREENSHOTS_DIR=/screenshots \
            mediamtx-connect:smoke
      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /tmp/health.json 2>/dev/null; then
              echo "Health endpoint returned 200"
              cat /tmp/health.json
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Health endpoint never returned 200"
              exit 1
            fi
            sleep 2
          done
      - name: Assert health response shape
        run: |
          grep -q '"status":"healthy"' /tmp/health.json
          grep -q '"database":"connected"' /tmp/health.json
      - name: Container logs on failure
        if: failure()
        run: docker logs mediamtx-connect-smoke 2>&1 | tail -200
      - name: Cleanup
        if: always()
        run: docker rm -f mediamtx-connect-smoke || true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test, image-smoke]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release
